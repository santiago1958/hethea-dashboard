<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HETHEA | Dashboard Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Jost', sans-serif; background: #faf9f7; margin: 0; }
        header { background: #fff; padding: 20px 40px; display: flex; justify-content: space-between; border-bottom: 1px solid #e0dcd3; }
        .card { background: #fff; border: 1px solid #e0dcd3; padding: 20px; margin: 20px 40px; }
        .input { padding: 8px; border: 1px solid #ccc; margin: 5px; }
        .btn { padding: 10px; cursor: pointer; background: #000; color: #fff; border: none; }
    </style>
</head>
<body>
    <div id="loginScreen" style="position:fixed; inset:0; background:#fff; z-index:999; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center;">
            <img src="Hethea.PNG" style="width:150px;">
            <input id="loginUser" placeholder="Usuario" class="input"><br>
            <input id="loginPass" type="password" placeholder="Contraseña" class="input"><br>
            <button class="btn" onclick="doLogin()">ACCEDER</button>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <img src="Hethea.PNG" style="width:40px; margin-right:15px;">
            <div><h2>HETHEA</h2><p id="userStatus"></p></div>
        </div>
        <button class="btn" onclick="location.reload()">SALIR</button>
    </header>

    <main>
        <div class="card">
            <h3>Importar Ventas Masivas (Excel)</h3>
            <input type="file" id="excelFile" accept=".xlsx, .xls">
            <button class="btn" onclick="processExcel()">PROCESAR CARGA</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Fecha</th><th>Pedido #</th><th>Canal</th><th>Monto</th><th>Autor</th></tr></thead>
                <tbody id="movBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN INTEGRADA CON TUS DATOS DE SUPABASE
        const sb = supabase.createClient(
            'https://dudxikgqfayjmqzuvzmi.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1ZHhpa2dxZmF5am1xenV2em1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg5NzA0NzksImV4cCI6MjA2NDU0NjQ3OX0.lW1h716L4zJb5zR5h9kGjL2e-F7kM9n8Jq6sR2t3u4v'
        );

        let currentUser = 'SSHADMIN';

        async function doLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if (u === 'SSHADMIN' && p === 'Bancol125*') {
                sessionStorage.setItem('auth', '1');
                sessionStorage.setItem('user', u);
                location.reload();
            } else { alert('Credenciales incorrectas'); }
        }

        async function processExcel() {
            const file = document.getElementById('excelFile').files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const wb = XLSX.read(e.target.result, {type: 'binary'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                for (let row of data) {
                    await sb.from('movimientos').upsert({
                        pedido_id: String(row['Pedido #']),
                        fecha_pedido: row['Fecha'],
                        monto: row['Ventas netas'],
                        canal_ventas: 'Online',
                        usuario: sessionStorage.getItem('user') || 'Admin',
                        created_at: new Date().toISOString()
                    }, { onConflict: 'pedido_id' });
                }
                alert('Carga completada');
                renderMovs();
            };
            reader.readAsBinaryString(file);
        }

        async function renderMovs() {
            const { data } = await sb.from('movimientos').select('*');
            document.getElementById('movBody').innerHTML = data.map(m => `<tr><td>${new Date(m.created_at).toLocaleDateString()}</td><td>${m.pedido_id}</td><td>${m.canal_ventas}</td><td>$${m.monto}</td><td>${m.usuario}</td></tr>`).join('');
        }

        if(sessionStorage.getItem('auth')) { 
            renderMovs(); 
            document.getElementById('loginScreen').style.display = 'none'; 
            document.getElementById('userStatus').textContent = 'Bienvenido, Admin';
        }
    </script>
</body>
</html>
