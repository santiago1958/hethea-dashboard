<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administrativo | HETHEA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Diseño Editorial Minimalista */
        :root { --main: #0a0a0a; --bg: #f5f3f0; --border: #dcd7cf; }
        body { font-family: 'Jost', sans-serif; background: var(--bg); margin: 0; }
        
        /* Layout Modular */
        .dashboard { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        .sidebar { background: #fff; padding: 30px; border-right: 1px solid var(--border); }
        .main-view { padding: 40px; }
        
        /* Componentes */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #fff; border: 1px solid var(--border); padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn { background: var(--main); color: #fff; padding: 12px 20px; border: none; cursor: pointer; width: 100%; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--main); padding: 10px; }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <h2 style="font-family: 'Playfair Display';">HETHEA</h2>
        <div class="card">
            <h4>Importar Data</h4>
            <input type="file" id="excelFile">
            <button class="btn" onclick="processExcel()">PROCESAR EXCEL</button>
        </div>
        <div class="card" style="margin-top:20px;">
            <h4>Filtro Categorías</h4>
            <select id="catFilter" onchange="renderMovs()" style="width:100%; padding:8px;">
                <option value="Todos">Todas las categorías</option>
                <option value="Ventas">Ventas</option>
                <option value="Packaging">Packaging</option>
            </select>
        </div>
    </aside>

    <main class="main-view">
        <div class="kpi-grid">
            <div class="card"><h4>Ventas Totales</h4><h2 id="kpi-ventas">$0</h2></div>
            <div class="card"><h4>Pedidos</h4><h2 id="kpi-pedidos">0</h2></div>
            <div class="card"><h4>Ticket Promedio</h4><h2 id="kpi-avg">$0</h2></div>
        </div>

        <div class="card">
            <h3>Historial Detallado</h3>
            <table id="movTable">
                <thead><tr><th>Fecha</th><th>Pedido #</th><th>Categoría</th><th>Monto</th></tr></thead>
                <tbody id="movBody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const sb = supabase.createClient('URL', 'KEY'); // RELLENA AQUÍ

    async function renderMovs() {
        const { data } = await sb.from('movimientos').select('*');
        if (!data) return;

        // Lógica de KPIs (El "cerebro" del dashboard)
        const total = data.reduce((acc, m) => acc + (parseFloat(m.monto) || 0), 0);
        document.getElementById('kpi-ventas').innerText = `$${total.toLocaleString()}`;
        document.getElementById('kpi-pedidos').innerText = data.length;
        document.getElementById('kpi-avg').innerText = `$${(total / data.length || 0).toFixed(0)}`;

        // Renderizado de tabla
        document.getElementById('movBody').innerHTML = data.map(m => `
            <tr>
                <td>${new Date(m.created_at).toLocaleDateString()}</td>
                <td>${m.pedido_id}</td>
                <td>${m.cat || 'Venta'}</td>
                <td>$${parseFloat(m.monto).toLocaleString()}</td>
            </tr>`).join('');
    }

    // Proceso de carga masiva con manejo de errores
    async function processExcel() {
        const file = document.getElementById('excelFile').files[0];
        if(!file) return alert("Selecciona un archivo");
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(e.target.result, {type: 'binary'}).Sheets[0]);
            for (let row of data) {
                await sb.from('movimientos').upsert({
                    pedido_id: String(row['Pedido #']),
                    monto: row['Ventas netas'],
                    cat: 'Ventas',
                    created_at: new Date().toISOString()
                }, { onConflict: 'pedido_id' });
            }
            alert('Carga exitosa');
            renderMovs();
        };
        reader.readAsBinaryString(file);
    }
    renderMovs();
</script>
</body>
</html>
