<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HETHEA | Portal Financiero</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* PALETA DE COLORES */
        :root {
            --bg: #Faf9f7; 
            --surface: #ffffff;
            --surface2: #f2efe9;
            --border: #e0dcd3;
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --accent: #000000;
            --rhodium: #8a8d91;
            --green: #276749;
            --danger: #9b2c2c;
            --warn: #975a16;
        }

        /* ESTILOS DE LOGO */
        .logo-header { height: 35px; width: auto; display: block; }
        .logo-login { max-width: 220px; width: 100%; height: auto; margin: 0 auto 20px auto; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100vh; }
        body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .sub-logo { font-size: 0.65rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: -2px; }
        
        main { padding: 30px 40px; max-width: 1440px; margin: 0 auto; padding-bottom: 110px; }

        /* TABS */
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 0; border: none; background: transparent; color: var(--muted); font-family: 'Jost', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all .3s; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--accent); }

        /* KPIs */
        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi { background: var(--surface); border: 1px solid var(--border); padding: 24px; }
        .kpi-value { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 500; color: var(--accent); }
        
        /* FORMULARIOS */
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .igroup { background: var(--surface); border: 1px solid var(--border); padding: 24px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 10px 12px; }

        /* BOTONES */
        .btn { padding: 10px 24px; border: none; font-family: 'Jost', sans-serif; cursor: pointer; text-transform: uppercase; }
        .btn-p { background: var(--accent); color: #fff; }
        
        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-wrap { display: flex; max-width: 900px; width: 100%; height: 500px; background: var(--surface); box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .login-image { flex: 1; background: url('https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?auto=format&fit=crop&w=800&q=80') center/cover; }
        .login-box { flex: 1; padding: 60px 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 1rem; }
        .login-input#loginUser { text-transform: uppercase; }
        .login-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 14px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .eye-btn { position: absolute; right: 0; bottom: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.7rem; }

        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 12px 24px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="loginScreen">
      <div class="login-wrap">
        <div class="login-image"></div>
        <div class="login-box">
          <div class="login-brand">
            <img src="https://raw.githubusercontent.com/santiago1958/hethea-dashboard/main/Imagen.png" alt="HETHEA" class="logo-login">
          </div>
          <div class="login-field">
            <label>Usuario</label>
            <input class="login-input" type="text" id="loginUser" oninput="this.value = this.value.toUpperCase()" placeholder="INGRESE SU USUARIO">
          </div>
          <div class="login-field" style="position:relative;">
            <label>Contraseña</label>
            <input class="login-input" type="password" id="loginPass">
            <button class="eye-btn" onclick="togglePass()" id="eyeBtn">VER</button>
          </div>
          <button class="login-btn" onclick="doLogin()">Acceder</button>
        </div>
      </div>
    </div>

    <header>
      <div>
        <div class="brand-logo"><img src="https://raw.githubusercontent.com/santiago1958/hethea-dashboard/main/Imagen.png" alt="HETHEA" class="logo-header"></div>
        <div class="sub-logo">Finanzas & Operaciones</div>
      </div>
      <div>
          <span id="activeUserLabel"></span>
          <button class="btn btn-ghost" onclick="cerrarSesion()">Salir</button>
      </div>
    </header>

    <main>
        <div id="tab-ingresar">
            <div class="input-grid">
              <div class="igroup">
                <h3>Ingreso</h3>
                <div class="field"><label>Categoría</label>
                  <select id="catI"><option>Ventas de piezas</option><option>Pedidos personalizados</option></select></div>
                <div class="field"><label>Monto ($)</label><input type="number" id="mtoI" placeholder="0.00"></div>
                <div class="field"><label>Nota</label><input type="text" id="ntaI"></div>
                <button class="btn btn-p" onclick="agregar('Ingreso')">Registrar Ingreso</button>
              </div>
            </div>
        </div>
    </main>

    <div id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://ltxzatdfqyyzvilrhpvs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LW224xultOPk7brIBcC3bQ_lmPn5Dmg';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = '';

        function toast(msg, type='ok') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'show';
            setTimeout(() => t.className = '', 2800);
        }

        function togglePass() {
            const p = document.getElementById('loginPass');
            const b = document.getElementById('eyeBtn');
            if(p.type === 'password') { p.type = 'text'; b.textContent = 'OCULTAR'; }
            else { p.type = 'password'; b.textContent = 'VER'; }
        }

        async function hashStr(str) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function doLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            if(!user || !pass) return;

            const passHash = await hashStr(pass);
            const { data } = await sb.from('usuarios').select('*').eq('usuario', user).single();
            const isMaster = (user === 'SSHADMIN' && pass === 'Bancol125*');

            if (isMaster || (data && data.password_hash === passHash)) {
                sessionStorage.setItem('hethea_auth', '1');
                sessionStorage.setItem('hethea_user', user);
                document.getElementById('loginScreen').style.display = 'none';
                currentUser = user;
            } else {
                alert("Credenciales incorrectas");
            }
        }

        window.agregar = async function(tipo) {
            const mto = parseFloat(document.getElementById('mtoI').value);
            const cat = document.getElementById('catI').value;
            const nta = document.getElementById('ntaI').value;

            if(!mto) { toast('Monto inválido', 'er'); return; }

            try {
                // AQUÍ ESTÁ EL INTENTO DE REGISTRO
                const { data, error } = await sb.from('movimientos').insert({ 
                    anio: 2025,
                    mes: new Date().getMonth(),
                    tipo: tipo,
                    cat: cat,
                    monto: mto,
                    nota: nta,
                    ts: Date.now(),
                    usuario: currentUser || 'SSHADMIN',
                    tienda: 'Online'
                });

                if (error) {
                    // SI FALLA, LANZARÁ ESTO A LA CONSOLA
                    console.error("ERROR SUPABASE:", error);
                    toast('Error: ' + error.message, 'er');
                } else {
                    toast('Registro exitoso');
                }
            } catch (e) {
                console.error("ERROR EXCEPCIÓN:", e);
                toast('Error crítico: ' + e.message, 'er');
            }
        };

        function cerrarSesion() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
