<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HETHEA | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jost', sans-serif; background: #fdfcf9; margin: 0; }
        header { padding: 40px 5%; display: flex; justify-content: space-between; border-bottom: 1px solid #e0dcd3; }
        .main-container { padding: 40px 5%; display: grid; grid-template-columns: 350px 1fr; gap: 40px; }
        .card { background: #fff; border: 1px solid #e0dcd3; padding: 25px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .btn { padding: 12px 20px; background: #1a1a1a; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:#fdfcf9; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="width:300px; text-align:center;">
        <img src="Hethea.PNG" style="width:120px; margin-bottom:20px;">
        <input id="loginUser" class="card" placeholder="Usuario" style="width:100%; border:1px solid #ccc; padding:10px;"><br>
        <input id="loginPass" type="password" class="card" placeholder="Contraseña" style="width:100%; border:1px solid #ccc; padding:10px;"><br>
        <button class="btn" style="width:100%" onclick="doLogin()">ACCEDER</button>
    </div>
</div>

<header>
    <h2 style="font-family: 'Playfair Display';">HETHEA Dashboard</h2>
    <button class="btn" onclick="location.reload()">Cerrar Sesión</button>
</header>

<div class="main-container">
    <div>
        <div class="card">
            <h3>Carga Masiva</h3>
            <input type="file" id="excelFile" accept=".xlsx" style="margin-bottom:15px;">
            <button class="btn" onclick="processExcel()">Procesar Excel</button>
        </div>
    </div>

    <div class="card">
        <h3>Historial de Movimientos</h3>
        <table id="movTable">
            <thead><tr><th>Fecha</th><th>Pedido #</th><th>Monto</th><th>Autor</th></tr></thead>
            <tbody id="movBody"></tbody>
        </table>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://dudxikgqfayjmqzuvzmi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1ZHhpa2dxZmF5am1xenV2em1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg5NzA0NzksImV4cCI6MjA2NDU0NjQ3OX0.lW1h716L4zJb5zR5h9kGjL2e-F7kM9n8Jq6sR2t3u4v');

    async function doLogin() {
        if (document.getElementById('loginUser').value === 'SSHADMIN' && document.getElementById('loginPass').value === 'Bancol125*') {
            sessionStorage.setItem('auth', '1');
            location.reload();
        } else { alert('Credenciales incorrectas'); }
    }

    async function renderMovs() {
        const { data, error } = await sb.from('movimientos').select('*');
        if(error) { console.error(error); return; }
        document.getElementById('movBody').innerHTML = data.map(m => `
            <tr>
                <td>${new Date(m.created_at).toLocaleDateString()}</td>
                <td>${m.pedido_id}</td>
                <td>$${m.monto}</td>
                <td>${m.usuario || 'Admin'}</td>
            </tr>`).join('');
    }

    async function processExcel() {
        const file = document.getElementById('excelFile').files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(e.target.result, {type: 'binary'}).Sheets[0]);
            for (let row of data) {
                await sb.from('movimientos').upsert({
                    pedido_id: String(row['Pedido #']),
                    monto: row['Ventas netas'],
                    usuario: 'SSHADMIN',
                    created_at: new Date().toISOString()
                }, { onConflict: 'pedido_id' });
            }
            alert('¡Carga exitosa!');
            renderMovs();
        };
        reader.readAsBinaryString(file);
    }

    if(sessionStorage.getItem('auth')) {
        document.getElementById('loginScreen').style.display = 'none';
        renderMovs();
    }
</script>
</body>
</html>
