<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HETHEA | Dashboard Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfcf9; --accent: #1a1a1a; --border: #e0dcd3; }
        body { font-family: 'Jost', sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        /* Login centrado y elegante */
        #loginScreen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 1000; }
        .login-box { width: 320px; text-align: center; }
        .login-box img { width: 120px; margin-bottom: 20px; }
        .input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); background: transparent; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }

        /* Dashboard */
        header { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .dashboard-content { padding: 40px 5%; }
        .card { background: #fff; border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { border-bottom: 2px solid var(--accent); padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <img src="Hethea.PNG" alt="HETHEA">
        <input id="loginUser" class="input" placeholder="USUARIO">
        <input id="loginPass" type="password" class="input" placeholder="CONTRASEÑA">
        <button class="btn" onclick="doLogin()">Entrar</button>
    </div>
</div>

<header>
    <h2 style="font-family: 'Playfair Display'; margin: 0;">HETHEA</h2>
    <button class="btn" style="width: auto;" onclick="location.reload()">Cerrar Sesión</button>
</header>

<div class="dashboard-content">
    <div class="card">
        <h3>Importar Ventas Masivas</h3>
        <input type="file" id="excelFile" accept=".xlsx">
        <button class="btn" style="width: auto;" onclick="processExcel()">Procesar Archivo</button>
    </div>

    <div class="card">
        <h3>Historial de Ventas</h3>
        <table id="movTable">
            <thead><tr><th>Fecha</th><th>Pedido #</th><th>Monto</th><th>Autor</th></tr></thead>
            <tbody id="movBody"></tbody>
        </table>
    </div>
</div>

<script>
    // TUS DATOS DE SUPABASE (Copiados de tu imagen)
    const sb = supabase.createClient(
        'https://dudxikgqfayjmqzuvzmi.supabase.co', 
        'sb_publishable_ZynZ0LuoT1UwEbPSPjABQ_T8tL1...' 
    );

    async function doLogin() {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        if (u === 'SSHADMIN' && p === 'Bancol125*') {
            sessionStorage.setItem('auth', '1');
            sessionStorage.setItem('user', u);
            document.getElementById('loginScreen').style.display = 'none';
            renderMovs();
        } else { alert('Acceso denegado'); }
    }

    async function processExcel() {
        const file = document.getElementById('excelFile').files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(e.target.result, {type: 'binary'}).Sheets[0]);
            for (let row of data) {
                await sb.from('movimientos').upsert({
                    pedido_id: String(row['Pedido #']),
                    monto: row['Ventas netas'],
                    usuario: 'SSHADMIN',
                    created_at: new Date().toISOString()
                }, { onConflict: 'pedido_id' });
            }
            alert('¡Carga exitosa!');
            renderMovs();
        };
        reader.readAsBinaryString(file);
    }

    async function renderMovs() {
        const { data } = await sb.from('movimientos').select('*');
        document.getElementById('movBody').innerHTML = data.map(m => `
            <tr>
                <td>${new Date(m.created_at).toLocaleDateString()}</td>
                <td>${m.pedido_id}</td>
                <td>$${m.monto.toLocaleString()}</td>
                <td>${m.usuario}</td>
            </tr>`).join('');
    }

    if(sessionStorage.getItem('auth')) { 
        document.getElementById('loginScreen').style.display = 'none'; 
        renderMovs();
    }
</script>
</body>
</html>
