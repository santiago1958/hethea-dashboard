<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HETHEA | Dashboard Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{--bg:#07101f;--surface:#0f1f35;--accent:#00e5b4;--text:#dde8f5;--border:#1d3352;}
        body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;}
        .container{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}
        .sidebar{background:var(--surface);padding:20px;border-right:1px solid var(--border);}
        .main{padding:40px;}
        .card{background:var(--surface);border:1px solid var(--border);padding:20px;margin-bottom:20px;border-radius:10px;}
        input, select{width:100%;padding:10px;margin:5px 0;background:var(--bg);border:1px solid var(--border);color:white;}
        button{width:100%;padding:10px;background:var(--accent);border:none;cursor:pointer;font-weight:bold;}
        table{width:100%;border-collapse:collapse;color:white;}
        th,td{padding:10px;border-bottom:1px solid var(--border);}
    </style>
</head>
<body>

<div id="loginScreen" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="width:300px;">
        <h2>HETHEA - Login</h2>
        <input id="u" placeholder="Usuario">
        <input id="p" type="password" placeholder="Clave">
        <button onclick="doLogin()">ENTRAR</button>
    </div>
</div>

<div class="container">
    <aside class="sidebar">
        <h3>HETHEA</h3>
        <div class="card">
            <h4>Carga Masiva</h4>
            <input type="file" id="f">
            <button onclick="processExcel()">PROCESAR</button>
        </div>
        <div class="card">
            <h4>Registro Manual</h4>
            <select id="cat">
                <optgroup label="Ingresos"><option>Ventas</option><option>Ventas especiales</option><option>Aportes</option></optgroup>
                <optgroup label="Egresos"><option>Mantenimiento</option><option>Packaging</option><option>Operaciones logísticas</option><option>Alimentos y cafetería</option><option>Transportes</option><option>Avances</option></optgroup>
                <optgroup label="Gastos Fijos"><option>Servicios Web</option><option>Anuncios y promociones</option><option>Marketing</option><option>Servicios públicos</option><option>Pago proveedores</option><option>Aseo</option><option>Arriendo</option><option>Nómina</option></optgroup>
            </select>
            <input id="mto" type="number" placeholder="Monto">
            <select id="canal"><option>Online</option><option>Física</option><option>Consultoras</option></select>
            <button onclick="registrar()">REGISTRAR</button>
        </div>
    </aside>
    <main class="main">
        <div class="card">
            <h3>Movimientos</h3>
            <table>
                <thead><tr><th>Fecha</th><th>Pedido/Cat</th><th>Monto</th><th>Autor</th><th>Acción</th></tr></thead>
                <tbody id="body"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
    const sb = supabase.createClient('https://dudxikgqfayjmqzuvzmi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1ZHhpa2dxZmF5am1xenV2em1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg5NzA0NzksImV4cCI6MjA2NDU0NjQ3OX0.lW1h716L4zJb5zR5h9kGjL2e-F7kM9n8Jq6sR2t3u4v');

    function doLogin() {
        if(document.getElementById('u').value === 'SSHADMIN' && document.getElementById('p').value === 'Bancol125*') {
            sessionStorage.setItem('auth','1'); location.reload();
        } else { alert('Error'); }
    }

    async function render() {
        const { data } = await sb.from('movimientos').select('*').order('created_at', {ascending:false});
        document.getElementById('body').innerHTML = data.map(m => `<tr>
            <td>${m.created_at.split('T')[0]}</td>
            <td>${m.pedido_id || m.cat}</td>
            <td>$${m.monto}</td>
            <td>${m.usuario}</td>
            <td><button onclick="eliminar(${m.id})">X</button></td>
        </tr>`).join('');
    }

    async function eliminar(id) {
        const u = prompt("Usuario:");
        if(u === 'SSHADMIN') {
            await sb.from('movimientos').delete().eq('id', id);
            render();
        }
    }

    async function registrar() {
        await sb.from('movimientos').insert({
            cat: document.getElementById('cat').value,
            monto: document.getElementById('mto').value,
            canal_ventas: document.getElementById('canal').value,
            usuario: 'SSHADMIN',
            created_at: new Date().toISOString()
        });
        render();
    }

    async function processExcel() {
        const file = document.getElementById('f').files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(e.target.result, {type: 'binary'}).Sheets[0]);
            for(let r of data) {
                await sb.from('movimientos').upsert({
                    pedido_id: String(r['Pedido #']),
                    monto: r['Ventas netas'],
                    usuario: 'SSHADMIN',
                    created_at: new Date().toISOString()
                }, {onConflict: 'pedido_id'});
            }
            render();
        };
        reader.readAsBinaryString(file);
    }

    if(sessionStorage.getItem('auth')) {
        document.getElementById('loginScreen').style.display='none';
        render();
    }
</script>
</body>
</html>
